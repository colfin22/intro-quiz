<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Intro Quiz — Board</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/static/quiz.css">
<style>
  [hidden] { display:none !important; }  /* inline display styles must never beat hidden */
  /* TV-friendly: everything must fit a 16:9 viewport with no scrolling */
  html, body { height:100%; overflow:hidden; }
  main { max-width:min(96vw, 1100px); height:100vh; display:flex; flex-direction:column; padding:2vh 2vw; box-sizing:border-box; }
  h1 { font-size:clamp(1.1rem, 3.5vh, 1.8rem); margin:0 0 1vh; }
  .big { font-size:clamp(1.4rem, 6vh, 3rem); margin:1vh 0; }
  .cols { display:flex; gap:1.5vw; align-items:stretch; flex:1; min-height:0; }
  .cols > * { flex:1; min-height:0; overflow:hidden; }
  #b-art-card { display:flex; flex-direction:column; align-items:center; justify-content:center; }
  img.art { max-height:42vh; max-width:90%; width:auto; margin:1vh auto; }
  #b-title { font-size:clamp(1.1rem, 4.5vh, 2rem) !important; margin:.5vh 0; text-align:center; }
  #b-detail { font-size:clamp(.9rem, 3vh, 1.3rem); text-align:center; text-transform:uppercase; }
  #b-results { font-size:clamp(.85rem, 2.6vh, 1.15rem); text-align:center; margin:.6vh 0 0; }
  .scores li { font-size:clamp(1rem, 3.2vh, 1.5rem); }
  .wavebox { height:40vh; display:flex; align-items:center; overflow:hidden; }
  .wavebox svg { width:100%; height:60%; }
  .wavebox path { fill:none; stroke:var(--accent); stroke-width:4; stroke-linecap:round; }
  .wavebox .w1 { animation:flow 2.4s linear infinite; }
  .wavebox .w2 { stroke:#7f8ba3; opacity:.6; stroke-width:3; animation:flow 3.8s linear infinite reverse; }
  @keyframes flow { from { transform:translateX(0);} to { transform:translateX(-50%);} }
  #b-results li b.good { color:var(--good); } #b-results li b.bad { color:var(--bad); }
  .clipbar { height:1.6vh; background:#2a3140; border-radius:1vh; overflow:hidden; margin:1.5vh 8% 0; }
  .clipbar > div { height:100%; width:0%; background:var(--good); border-radius:1vh; }
</style>
</head>
<body>
<main>
  <h1 class="center">🎵 Intro Quiz</h1>
  <div id="b-idle" class="card center" hidden>
    <p class="big">Waiting for a game…</p>
    <p class="dim">Open this page's address on your phone to play.</p>
  </div>
  <div id="b-live" hidden>
    <p class="big center" id="b-status"></p>
    <div class="cols">
      <div class="card center" id="b-wave-card" hidden>
        <div class="wavebox">
          <svg viewBox="0 0 400 120" preserveAspectRatio="none">
            <path class="w1" d="M0 60 Q 25 15 50 60 T 100 60 T 150 60 T 200 60 T 250 60 T 300 60 T 350 60 T 400 60
                                 Q 425 15 450 60 T 500 60 T 550 60 T 600 60 T 650 60 T 700 60 T 750 60 T 800 60" />
            <path class="w2" d="M0 60 Q 35 105 70 60 T 140 60 T 210 60 T 280 60 T 350 60 T 420 60
                                 Q 455 105 490 60 T 560 60 T 630 60 T 700 60 T 770 60 T 840 60" />
          </svg>
        </div>
        <p class="dim" style="font-size:clamp(1rem,3vh,1.4rem)">🎧 <span id="b-clip-label">listen…</span></p>
        <div class="clipbar"><div id="b-clip-progress"></div></div>
      </div>
      <div class="card center" id="b-art-card" hidden>
        <img class="art" id="b-art" alt="">
        <p class="big" id="b-title" style="font-size:1.6rem"></p>
        <p class="dim" id="b-detail"></p>
        <p class="dim" id="b-results"></p>
      </div>
      <div class="card center" id="b-break-card" hidden
           style="display:flex;flex-direction:column;justify-content:center">
        <p id="b-break-big" style="font-size:clamp(1.2rem,5vh,2.2rem);margin:1vh 0"></p>
        <p class="dim" id="b-break-detail" style="font-size:clamp(1rem,3.2vh,1.5rem)"></p>
      </div>
      <div class="card">
        <p class="dim">Scores</p>
        <ul class="scores" id="b-scores"></ul>
      </div>
      <div class="card" id="b-alltime-card" hidden>
        <p class="dim">🏆 All-time</p>
        <ul class="scores" id="b-alltime"></ul>
      </div>
    </div>
  </div>
</main>
<div id="b-tap" style="position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:9;font-size:3rem;flex-direction:column">
  <div>🔊</div><div style="font-size:1.6rem">Tap anywhere for sound</div>
</div>
<p class="dim center" id="b-audio-status"></p>
<script>
let ws, lastKey = "", audioUnlocked = false, alltimeKey = "";
// --- Web Audio engine (#47) -------------------------------------------------
// Playing each clip via <audio>.src spun up a new WebMediaPlayer in Cast core and
// grew a NATIVE audio-decoder buffer pool ~8 buffers/clip that never shrank; at
// ~200 buffers (~25 clips = game 2) the receiver's audio engine died and took the
// whole receiver with it — invisible to the JS heap, proven by adb logcat. Fix:
// ONE AudioContext for the whole session; each clip is fetch()'d, decodeAudioData'd
// and played through a short-lived source node. One pipeline, not one per clip.
let actx = null, curSource = null, curBuffer = null;
let audioState = "none", clipStartAt = 0, clipDur = 0, retryTimer = null, retryCount = 0;
function ensureCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}
function aStatus(t) { document.getElementById("b-audio-status").textContent = t; }
function boardLog(msg) {
  try { fetch("/api/board/log", { method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ msg }) }); } catch (e) {}
}
// a full page reload re-inits the audio + socket in ~2s and clears a wedged
// cast far faster than 30s of element retries — loop-guarded so a genuine 404
// can't thrash it (#29)
function boardReload(reason) {
  const now = Date.now();
  let hist = [];
  try { hist = JSON.parse(sessionStorage.getItem("reloads") || "[]"); } catch (e) {}
  hist = hist.filter(t => now - t < 40000);
  if (hist.length >= 2) { boardLog("reload suppressed (loop guard): " + reason); return false; }
  hist.push(now);
  try { sessionStorage.setItem("reloads", JSON.stringify(hist)); } catch (e) {}
  boardLog("board self-reload: " + reason);
  setTimeout(() => location.reload(), 150);  // let the log POST flush first
  return true;
}
function stopSource() {
  if (curSource) {
    try { curSource.onended = null; curSource.stop(); } catch (e) {}
    try { curSource.disconnect(); } catch (e) {}
    curSource = null;
  }
  if (audioState === "playing") audioState = "paused";
}
function startBuffer(buf, key) {
  const ctx = ensureCtx();
  stopSource();
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.onended = () => { if (curSource === src) audioState = "paused"; };
  try { src.start(); } catch (e) {}
  curSource = src; curBuffer = buf;
  clipStartAt = ctx.currentTime; clipDur = buf.duration; audioState = "playing";
  const bar = document.getElementById("b-clip-progress");
  if (bar) bar.style.width = "0%";
  aStatus("");
}
// fetch + decode + play one clip through the shared context; keyed so a superseded
// round can't stomp a newer one. Keeps the #24 retry-the-whole-round behaviour.
async function playClip(url, key) {
  const ctx = ensureCtx();
  if (ctx.state === "suspended") { try { await ctx.resume(); } catch (e) {} }
  if (ctx.state === "suspended") { audioUnlocked = false; showTap(); return; }
  audioUnlocked = true;
  try {
    const resp = await fetch(url, { cache: "no-store" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const buf = await ctx.decodeAudioData(await resp.arrayBuffer());
    if (key !== lastKey) return;               // a newer clip already took over
    retryCount = 0;
    startBuffer(buf, key);
  } catch (e) {
    if (key !== lastKey) return;
    if (retryCount === 0 || retryCount % 4 === 0) boardLog(`clip load failed (${e && e.message}) for ${key} (attempt ${retryCount + 1})`);
    retryCount++;
    if (retryCount === 3 && boardReload(`audio failed ${retryCount}x`)) return;
    if (retryCount < 15) retryTimer = setTimeout(() => { if (key === lastKey) playClip(url, key); }, retryCount < 4 ? 1200 : 2000);
  }
}
function playAudio(kind, key) {
  if (key === lastKey) return;
  clearTimeout(retryTimer); retryCount = 0;
  lastKey = key;
  const url = kind === "fanfare"
    ? "/static/fanfare.mp3"
    : `/api/round/audio?kind=${kind}&k=${encodeURIComponent(key)}`;
  playClip(url, key);
}
function probeAudio() {
  const ctx = ensureCtx();
  if (ctx.state === "suspended")
    ctx.resume().then(() => { audioUnlocked = ctx.state === "running"; if (!audioUnlocked) showTap(); }).catch(() => showTap());
  else audioUnlocked = true;
}
window.addEventListener("load", () => setTimeout(probeAudio, 300));
// progress bar — Web Audio has no timeupdate, so drive it off the context clock
function tickProgress() {
  const bar = document.getElementById("b-clip-progress");
  if (bar && audioState === "playing" && clipDur && actx)
    bar.style.width = Math.min(100, Math.max(0, ((actx.currentTime - clipStartAt) / clipDur) * 100)) + "%";
  requestAnimationFrame(tickProgress);
}
requestAnimationFrame(tickProgress);
function showTap() {
  document.getElementById("b-tap").style.display = "flex";
  aStatus("audio blocked — tap the screen once");
}
document.addEventListener("pointerdown", () => {
  document.getElementById("b-tap").style.display = "none";
  aStatus("");
  const ctx = ensureCtx();
  if (ctx.state === "suspended") ctx.resume().catch(() => {});
  audioUnlocked = true;
  if (curBuffer && lastKey) startBuffer(curBuffer, lastKey);  // replay a clip that was blocked
}, {capture: true});
// heartbeat: the server only trusts a board it has heard from recently —
// a crashed cast receiver can leave a zombie socket open through a proxy
setInterval(() => {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type: "board_hello"}));
}, 5000);
// --- diagnosis beat (#35): the board's death is silent, so leave a trail ---
let lastPhase = "?", lastRound = 0, beatN = 0;
const pageBorn = Date.now();
setInterval(() => {
  const body = {
    n: ++beatN,
    up: Math.round((Date.now() - pageBorn) / 1000),   // page uptime: a RESET means it reloaded/recast
    phase: lastPhase,
    round: lastRound,
    audio: audioState,
    ws: ws ? ws.readyState : -1
  };
  try { fetch("/api/board/beat", {method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body), keepalive: true}); } catch (e) {}
}, 10000);
function connect() {
  ws = new WebSocket(`${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`);
  ws.onopen = () => ws.send(JSON.stringify({type: "board_hello"}));
  ws.onmessage = (ev) => {
    const s = JSON.parse(ev.data);
    if (s.type !== "state") return;
    // --- age out the receiver BETWEEN games, never during one (#35) ---
    // The beats showed the DashCast session rots with age: it dies at ~260-330s of page
    // life, mid-round, with audio playing — it is not idle, it is just old. Without the
    // old quit-on-new_game the page now persists ACROSS games, so it accumulates that age
    // and dies in the middle of one. So: when a game ends and the next lobby opens, an
    // OLD page reloads itself. A fresh page cannot reach the age at which it dies, and
    // the reload happens where nobody is looking instead of mid-question.
    const wasPhase = lastPhase;
    lastPhase = s.phase; lastRound = s.round || 0;   // for the diagnostic beat (#35)
    if ((s.phase === "lobby" || s.phase === "idle") && wasPhase !== s.phase) {
      const age = (Date.now() - pageBorn) / 1000;
      if (age > 120) {                                // young pages have nothing to gain
        // TELL THE SERVER FIRST. The reload silences the heartbeat for a couple of
        // seconds — longer than the watchdog's 12s death threshold — so it read this
        // deliberate refresh as a dead receiver and fired a full DashCast recast on top
        // of it. That double hit is what dropped the cast at the start of games 2 and 3.
        // A reload announced in advance is not a death.
        try { fetch("/api/board/reloading", {method: "POST", keepalive: true}); } catch (e) {}
        try { fetch("/api/board/log", {method: "POST", headers: {"Content-Type": "application/json"},
              body: JSON.stringify({msg: `between games — refreshing the board at ${Math.round(age)}s to keep the receiver young`}), keepalive: true}); } catch (e) {}
        setTimeout(() => location.reload(), 400);     // let the beacons leave first
        return;
      }
    }
    if (s.phase === "question") playAudio(s.clip_len, `q${s.round}-${s.clip_len}-${s.replay || 0}`);
    if (s.phase === "reveal" && s.track) playAudio("payoff", `p${s.round}`);
    if (s.phase === "finished" && lastKey !== `f-${s.game_no}`) {  // 🎺 once per game
      playAudio("fanfare", `f-${s.game_no}`);
    }
    document.getElementById("b-idle").hidden = s.phase !== "idle";
    document.getElementById("b-live").hidden = s.phase === "idle";
    if (s.phase === "idle") return;
    const st = document.getElementById("b-status");
    if (s.phase === "lobby") st.textContent = `Lobby — ${s.players.length} in` + (s.host ? `  ·  🎤 ${s.host}` : "");
    if (s.phase === "question") st.textContent = `Round ${s.round}/${s.total_rounds} — listen! 🎧`;
    if (s.phase === "reveal") st.textContent = `Round ${s.round}/${s.total_rounds}`;
    if (s.phase === "break") st.textContent = s.break_stage === "tf" && s.tf
      ? `🍿 Half time — true or false? ${s.tf.num}/${s.tf.total}` : "🍿 HALF TIME";
    if (s.phase === "finished") st.textContent = "🏆 Final!" + (s.next_host ? `  ·  🎤 ${s.next_host} masters the next game` : "");
    document.getElementById("b-wave-card").hidden = s.phase !== "question";
    if (s.phase === "question") document.getElementById("b-clip-label").textContent = `${s.clip_len} second clip`;
    const artCard = document.getElementById("b-art-card");
    artCard.hidden = !(s.phase === "reveal" && s.track);
    if (s.phase === "reveal" && s.track) {
      document.getElementById("b-art").src = `/api/art/${s.track.id}`;
      document.getElementById("b-title").textContent = s.track.title;
      document.getElementById("b-detail").textContent =
        `${s.track.artist}${s.track.year ? " (" + s.track.year + ")" : ""}`;
      document.getElementById("b-results").textContent = "";  // filled below if answers are in
    }
    // half-time show: facts prompt, then the T/F question front and centre
    const bkCard = document.getElementById("b-break-card");
    bkCard.hidden = s.phase !== "break";
    if (s.phase === "break") {
      const big = document.getElementById("b-break-big");
      const detail = document.getElementById("b-break-detail");
      if (s.break_stage === "tf" && s.tf) {
        big.textContent = s.tf.text;
        if (s.tf.revealed) {
          const bits = s.players.map(p => {
            const pts = (s.tf.results || {})[p.name];
            return pts === undefined ? `${p.name} —` : (pts > 0 ? `${p.name} ✅ +${pts}` : `${p.name} ❌`);
          });
          detail.textContent = `It's ${s.tf.answer ? "TRUE" : "FALSE"}!   ·   ` + bits.join("   ");
        } else {
          detail.textContent = "✅ true or ❌ false? Answer on your phones — +50 points"
            + (s.tf.answered.length ? `   ·   answered: ${s.tf.answered.join(", ")}` : "");
        }
      } else {
        big.textContent = "🍿 Half-time trivia!";
        detail.textContent = "Check your phones — everyone has a music fact to read out 📣";
      }
    }
    // per-round results on their own line under the artist
    if (s.phase === "reveal" && s.round_answers) {
      const bits = s.players.map(p => {
        const a = s.round_answers[p.name];
        if (!a) return `${p.name} —`;
        return a.points > 0 ? `${p.name} ✅ +${a.points}` : `${p.name} ❌`;
      });
      document.getElementById("b-results").textContent = bits.join("   ");
    }
    // all-time leaderboard beside the scores in the lobby and on the final screen;
    // fetched once per phase entry (finish() saves before broadcasting, so the
    // finished fetch already includes this game)
    const atCard = document.getElementById("b-alltime-card");
    atCard.hidden = !(s.phase === "lobby" || s.phase === "finished");
    if (!atCard.hidden && alltimeKey !== `${s.phase}-${s.game_no}`) {
      alltimeKey = `${s.phase}-${s.game_no}`;
      fetch("/api/leaderboard").then(r => r.json()).then(rows => {
        const al = document.getElementById("b-alltime");
        al.innerHTML = "";
        rows.slice(0, 8).forEach((r, i) => {
          const li = document.createElement("li");
          li.innerHTML = `<span>${["🥇","🥈","🥉"][i] || "&nbsp;&nbsp;"} ${r.player}</span>` +
            `<b>${r.total_score}</b>`;
          al.appendChild(li);
        });
        if (!rows.length) al.innerHTML = '<li class="dim">no games recorded yet</li>';
      }).catch(() => {});
    }
    const ul = document.getElementById("b-scores");
    ul.innerHTML = "";
    (s.players || []).forEach((p, i) => {
      const li = document.createElement("li");
      li.innerHTML = `<span>${["🥇","🥈","🥉"][i] || "&nbsp;&nbsp;"} ${p.name}</span><b>${p.score}</b>`;
      ul.appendChild(li);
    });
  };
  ws.onclose = () => setTimeout(connect, 1500);
}
connect();
</script>
</body>
</html>
