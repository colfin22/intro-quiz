<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Intro Quiz Cast Receiver</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; }
  #frame { border:0; width:100%; height:100%; display:block; }
</style>
</head>
<body>
<!-- Our own Cast receiver shell (#32). The board loads in the iframe below; this page
     never navigates, so the CAF receiver context stays alive for the whole session —
     unlike DashCast force=true, which replaced its receiver page with the board and
     (we believe) is why that session rotted at ~5 min of page age (#35). -->
<iframe id="frame" allow="autoplay; fullscreen"></iframe>
<script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<script>
const NS = "urn:x-cast:com.introquiz.board";
const frame = document.getElementById("frame");
const context = cast.framework.CastReceiverContext.getInstance();
let boardOrigin = null;

context.addCustomMessageListener(NS, (ev) => {
  const d = ev.data || {};
  if (d.type === "load" && d.url) {
    boardOrigin = new URL(d.url).origin;
    frame.src = d.url;
  }
});

// Shell-level BEAT (#35 pattern): the board beats about itself from inside the iframe;
// this beat is about the RECEIVER. If board beats stop but shell beats continue, the
// page died; if both stop, the Cast session itself was torn down.
let beatN = 0;
const pageBorn = Date.now();
setInterval(() => {
  if (!boardOrigin) return;
  const body = {
    n: ++beatN,
    up: Math.round((Date.now() - pageBorn) / 1000),
    phase: "shell",
    round: 0,
    audio: "n/a",
    ws: -1
  };
  try { fetch(boardOrigin + "/api/board/beat", {method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body), keepalive: true}); } catch (e) {}
}, 10000);

const options = new cast.framework.CastReceiverOptions();
options.disableIdleTimeout = true;   // the board is not "media"; never idle out
context.start(options);

// The shell is served from the same origin as the board, so it needs no telling:
// load /board directly. The message listener above stays as an override — a
// generic multi-host receiver (the published self-hoster version) needs it, and
// the sender's "load" message racing the page load is harmless now (same URL).
boardOrigin = location.origin;
frame.src = "/board";
</script>
</body>
</html>
