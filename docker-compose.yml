services:
  quiz:
    build: .
    container_name: intro-quiz
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/data
      # override with CLIPS_HOST_DIR in .env (e.g. /clips or C:\quiz-clips)
      - ${CLIPS_HOST_DIR:-./clips}:/clips
