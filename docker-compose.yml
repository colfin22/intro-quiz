services:
  quiz:
    # Pre-built images are published on each release. To pull instead of build:
    #   docker compose pull && docker compose up -d
    # `build: .` stays so you can still build locally (docker compose up -d --build).
    image: ghcr.io/colfin22/intro-quiz:latest
    build: .
    container_name: intro-quiz
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/data
      # override with CLIPS_HOST_DIR in .env (e.g. /clips or C:\quiz-clips)
      - ${CLIPS_HOST_DIR:-./clips}:/clips
