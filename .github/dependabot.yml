version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    ignore:
      # base-image bumps need a real image build + deploy test, not just CI
      # (which tests via setup-python regardless) — handled manually
      - dependency-name: python
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
