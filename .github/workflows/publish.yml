name: Publish image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version to build, e.g. 1.19.0 (must be an existing vX.Y.Z tag)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            V="${{ github.event.release.tag_name }}"
          else
            V="${{ github.event.inputs.tag }}"
          fi
          V="${V#v}"                       # strip a leading v
          echo "version=$V"        >> "$GITHUB_OUTPUT"
          echo "minor=${V%.*}"     >> "$GITHUB_OUTPUT"

      - name: Docker Hub configured?
        id: dh
        run: echo "enabled=${{ secrets.DOCKERHUB_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: "v${{ steps.ver.outputs.version }}"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dh.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compose image tags
        id: tags
        run: |
          V="${{ steps.ver.outputs.version }}"
          M="${{ steps.ver.outputs.minor }}"
          GHCR="ghcr.io/${{ github.repository }}"
          TAGS="${GHCR}:${V},${GHCR}:${M},${GHCR}:latest"
          if [ "${{ steps.dh.outputs.enabled }}" = "true" ]; then
            DH="${{ secrets.DOCKERHUB_USERNAME }}/intro-quiz"
            TAGS="${TAGS},${DH}:${V},${DH}:${M},${DH}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
